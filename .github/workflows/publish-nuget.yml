name: Publish NuGet Package

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@af9211b1364d382bc386cd82c6386875ad2ad796 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Run ModularPipelines publish pipeline
        env:
          NUGET_API_KEY: ''
          PIPELINE_MODE: validate
          RUN_LIVE_YAHOO_TESTS: '1'
        run: dotnet run --project pipelines/CyFinance.Pipelines/CyFinance.Pipelines.csproj --configuration Release

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg

      - name: Upload Docs artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6
        with:
          name: docs-site
          path: artifacts/docs

  publish:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@af9211b1364d382bc386cd82c6386875ad2ad796 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Download NuGet artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v6
        with:
          name: nuget-packages
          path: artifacts/nuget

      - name: Download Docs artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v6
        with:
          name: docs-site
          path: artifacts/docs

      - name: Run ModularPipelines publish pipeline
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          PIPELINE_MODE: publish
          RUN_LIVE_YAHOO_TESTS: '1'
        run: dotnet run --project pipelines/CyFinance.Pipelines/CyFinance.Pipelines.csproj --configuration Release

      - name: Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: artifacts/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
